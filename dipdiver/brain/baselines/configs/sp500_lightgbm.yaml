# M1 baseline: S&P 500 × LightGBM
# Same Qlib recipe as dow30; topk widened to 30 since the universe is larger.

name: sp500_lightgbm
universe: sp500
model: lightgbm
region: us
qlib_provider_uri: data/qlib/us_data

train_start: "2014-01-01"
train_end:   "2022-12-31"
valid_start: "2023-01-01"
valid_end:   "2023-12-31"
test_start:  "2024-01-01"
test_end:    "2025-12-31"

benchmark: "GSPC"
seed: 42

model_params:
  loss: mse
  colsample_bytree: 0.8879
  learning_rate: 0.0421
  subsample: 0.8789
  lambda_l1: 205.6999
  lambda_l2: 580.9768
  max_depth: 8
  num_leaves: 210
  num_threads: 20

backtest_params:
  topk: 30           # wider universe → larger basket for diversification
  n_drop: 6          # rotate 6 per rebalance
  open_cost: 0.0001
  close_cost: 0.0002
  min_cost: 1
