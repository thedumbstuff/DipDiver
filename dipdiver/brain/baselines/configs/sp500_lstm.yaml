# M1 baseline: S&P 500 × LSTM
# Sequence model variant for comparison against the LightGBM lock.

name: sp500_lstm
universe: sp500
model: lstm
region: us
qlib_provider_uri: data/qlib/us_data

train_start: "2014-01-01"
train_end:   "2022-12-31"
valid_start: "2023-01-01"
valid_end:   "2023-12-31"
test_start:  "2024-01-01"
test_end:    "2025-12-31"

benchmark: "GSPC"
seed: 42

model_params:
  d_feat: 158
  hidden_size: 64
  num_layers: 2
  dropout: 0.0
  n_epochs: 200
  lr: 0.001
  early_stop: 20
  batch_size: 800
  metric: loss
  loss: mse

backtest_params:
  topk: 30
  n_drop: 6
  open_cost: 0.0001
  close_cost: 0.0002
  min_cost: 1
