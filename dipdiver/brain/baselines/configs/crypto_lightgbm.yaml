# M1 baseline: small crypto basket × LightGBM
# 24/7 trading calendar; daily rebalance for v1 (intraday in a later milestone).

name: crypto_lightgbm
universe: crypto
model: lightgbm
region: crypto
qlib_provider_uri: data/qlib/crypto_data

train_start: "2019-01-01"
train_end:   "2022-12-31"
valid_start: "2023-01-01"
valid_end:   "2023-12-31"
test_start:  "2024-01-01"
test_end:    "2025-12-31"

benchmark: "BTC-USD"
seed: 42

model_params:
  loss: mse
  colsample_bytree: 0.8879
  learning_rate: 0.0421
  subsample: 0.8789
  lambda_l1: 205.6999
  lambda_l2: 580.9768
  max_depth: 8
  num_leaves: 210
  num_threads: 20

backtest_params:
  topk: 2             # universe is small; topk close to universe size
  n_drop: 1
  open_cost: 0.001    # ~0.1% per side on a major spot venue
  close_cost: 0.001
  min_cost: 0
