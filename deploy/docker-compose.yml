# DipDiver Ops UI — docker compose stack.
#
# Usage on VM (after running scripts/ops/bootstrap_vm.sh):
#   cd /opt/dipdiver/DipDiver
#   docker compose -f deploy/docker-compose.yml up -d
#
# The `ui` service binds to localhost (127.0.0.1:8765) — Tailscale on the host
# is what exposes it on the tailnet. No public ingress. See deploy/Caddyfile
# for an optional reverse-proxy layer (HTTPS via `tailscale cert`).

services:
  ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: dipdiver-ui:latest
    container_name: dipdiver-ui
    restart: unless-stopped
    network_mode: host
    environment:
      DIPDIVER_UI_HOST: 127.0.0.1
      DIPDIVER_UI_PORT: 8765
      DIPDIVER_UI_DATA_ROOT: /var/lib/dipdiver
      DIPDIVER_UI_LOG_LEVEL: INFO
      # Optional Telegram alerts. Leave unset to disable.
      DIPDIVER_UI_TELEGRAM_BOT_TOKEN: ${DIPDIVER_UI_TELEGRAM_BOT_TOKEN:-}
      DIPDIVER_UI_TELEGRAM_CHAT_ID: ${DIPDIVER_UI_TELEGRAM_CHAT_ID:-}
    volumes:
      # All UI state lives under this host path. Survives container rebuild.
      - /var/lib/dipdiver:/var/lib/dipdiver
      # Mount the broker keys + LLM keys read-only at the path the app expects.
      - /var/lib/dipdiver/secrets/.env.m2:/app/.env.m2:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://127.0.0.1:8765/health'); raise SystemExit(0 if r.status_code==200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
